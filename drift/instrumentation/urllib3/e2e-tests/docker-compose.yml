services:
  mock-upstream:
    image: python:3.12-slim
    command: ["python", "/mock/mock_server.py"]
    working_dir: /mock
    volumes:
      - ../../e2e_common/mock_upstream:/mock:ro
    environment:
      - PYTHONUNBUFFERED=1

  app:
    build:
      context: ../../../..
      dockerfile: drift/instrumentation/urllib3/e2e-tests/Dockerfile
      args:
        - TUSK_CLI_VERSION=${TUSK_CLI_VERSION:-latest}
    environment:
      - PORT=8000
      - TUSK_ANALYTICS_DISABLED=1
      - PYTHONUNBUFFERED=1
      - TUSK_USE_RUST_CORE=${TUSK_USE_RUST_CORE:-0}
      - BENCHMARKS=${BENCHMARKS:-}
      - BENCHMARK_DURATION=${BENCHMARK_DURATION:-10}
      - BENCHMARK_WARMUP=${BENCHMARK_WARMUP:-3}
      - TUSK_SAMPLING_RATE=${TUSK_SAMPLING_RATE:-}
      - USE_MOCK_EXTERNALS=${USE_MOCK_EXTERNALS:-1}
      - MOCK_SERVER_BASE_URL=${MOCK_SERVER_BASE_URL:-http://mock-upstream:8081}
    working_dir: /app
    depends_on:
      - mock-upstream
    volumes:
      # Mount SDK source for hot reload (no rebuild needed for SDK changes)
      - ../../../..:/sdk
      # Mount app source for development
      - ./src:/app/src
      # Mount .tusk folder to persist traces
      - ./.tusk:/app/.tusk

